# YouTube sources for the Phase 1 sandbox.
#
# Schema (per item):
#   url:          string, required
#   slug:         string, optional — filename stem; auto-derived if omitted
#   description:  string, optional
#   start / end:  string, optional — yt-dlp time trim ("HH:MM:SS")
#   tags:         list, optional
#
# ─── 2026-04-20 curation ─────────────────────────────────────────────────────
# Neither source is a proper fixed CCTV (they are dashcam / walking tours), but
# they contain stretches where the camera is effectively stationary (e.g.,
# stopped at a red light, paused on a pedestrian bridge). We downstream those
# stationary segments via `ingest.stationary_extractor` into data/normalized/
# to serve as fixed-view source material for the RTSP simulator.
#
# Rejected as too short:
#   - hdP__3PImRc  "Amman Jordan heavy traffic"       20 s, 720x480   (< 185s)
#   - IlM_7Nvqa6U  "Sounds of Amman, Jordan"          14 s, 1080p     (< 185s)

sources:
  - slug: amman-wadi-saqra-tour
    url: https://www.youtube.com/watch?v=hsPxEnpuhyw
    description: >-
      Wadi Saqra intersection tour — Sharif Al-Radi / Queen Noor / Arar streets.
      6 min, 1080p. "Tour" in title; extract stationary segments downstream.
    tags: [amman, wadi-saqra, tour, needs-stationary-extract]

  - slug: amman-7th-circle-drive
    url: https://www.youtube.com/watch?v=5AtlGb_ANgA
    description: >-
      7th Circle & Al Rawnaq 4K sunny-day drive-through during Ramadan.
      20 min, 4K. Dashcam drive; extract stop-at-red-light segments downstream.
    tags: [amman, 7th-circle, dashcam, 4k, needs-stationary-extract]

  - slug: amman-wadi-saqra-gardens-brt
    url: https://www.youtube.com/watch?v=52ao3WsInBo
    description: >-
      Elevated view of Wadi Saqra intersection, King Abdullah I Gardens, and
      the BRT (bus rapid transit) line. Second angle of the same target
      intersection as amman-wadi-saqra-tour — strengthens the visual domain
      anchor for the sim-to-real compositing pipeline.
    tags: [amman, wadi-saqra, elevated, brt, domain-anchor]
